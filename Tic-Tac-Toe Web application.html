<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#6a11cb,#2575fc);
    text-align:center;
    margin-top:50px;
}

h1{
    color:white;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-gap:10px;
    justify-content:center;
    margin-top:30px;
}

.cell{
    width:100px;
    height:100px;
    background:white;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:10px;
}

#status{
    margin-top:20px;
    font-size:20px;
    color:white;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#fff;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="board" id="board">
<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>
<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>
<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>
</div>

<div id="status">Player X Turn</div>

<button onclick="restart()">Restart</button>

<script>

let board = ["","","","","","","","",""];
let player = "X";
let gameOver = false;

const winPatterns = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function play(cell,index){

if(board[index] !== "" || gameOver) return;

board[index] = player;
cell.innerText = player;

checkWinner();

player = player === "X" ? "O" : "X";
document.getElementById("status").innerText = "Player " + player + " Turn";

}

function checkWinner(){

for(let pattern of winPatterns){

let [a,b,c] = pattern;

if(board[a] && board[a] === board[b] && board[a] === board[c]){

document.getElementById("status").innerText = "Player " + board[a] + " Wins!";
gameOver = true;
return;

}

}

if(!board.includes("")){
document.getElementById("status").innerText = "Draw!";
gameOver = true;
}

}

function restart(){

board = ["","","","","","","","",""];
player = "X";
gameOver = false;

document.querySelectorAll(".cell").forEach(cell=>cell.innerText="");
document.getElementById("status").innerText = "Player X Turn";

}

</script>

</body>
</html>
